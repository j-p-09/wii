<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WII Shop - Naročanje</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#2a2a40);
    color:white;
    overflow:hidden;
}

/* WELCOME */
#welcome {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    animation: fadeIn 1s;
}

#welcome h1 {
    font-size:60px;
    animation: float 2s infinite ease-in-out;
}

#welcome button {
    margin-top:30px;
    padding:20px 40px;
    font-size:24px;
    border:none;
    border-radius:15px;
    background:#00c3ff;
    color:white;
    cursor:pointer;
}

/* MAIN */
#app {
    display:none;
    height:100vh;
    flex-direction:column;
}

.topbar {
    padding:10px;
    background:#111;
}

.search {
    width:100%;
    padding:15px;
    font-size:20px;
    border-radius:10px;
    border:none;
}

.products {
    flex:1;
    overflow:auto;
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
    gap:15px;
    padding:15px;
}

.product {
    background:#2f2f50;
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
}

.product:hover {
    transform:scale(1.05);
    background:#3f3f70;
}

/* BOTTOM BAR */
.bottom {
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cart-btn {
    background:#00c3ff;
    padding:15px 30px;
    border-radius:10px;
    cursor:pointer;
}

/* MODAL */
.modal {
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#222;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:300px;
}

.qty {
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
}

.qty button {
    font-size:30px;
    padding:10px;
}

/* SUCCESS */
#success {
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

@keyframes float {
    0% {transform:translateY(0)}
    50% {transform:translateY(-10px)}
    100% {transform:translateY(0)}
}
</style>
</head>

<body>

<div id="welcome">
    <h1>👋 Dobrodošli v WII Shopu</h1>
    <button onclick="start()">ZAČNI NAROČILO</button>
</div>

<div id="app">
    <div class="topbar">
        <input class="search" placeholder="Išči..." oninput="render(this.value)">
    </div>

    <div class="products" id="products"></div>

    <div class="bottom">
        <button onclick="resetOrder()">❌ Prekliči</button>
        <div class="cart-btn" onclick="openCart()">🛒 (<span id="count">0</span>)</div>
    </div>
</div>

<div class="modal" id="modal"></div>

<div id="success">
    <h1>Naročilo oddano!</h1>
    <h2 id="orderId"></h2>
</div>

<script>
let db = JSON.parse(localStorage.getItem('wii_db_v3'));
let cart = [];

function start(){
    document.getElementById('welcome').style.display='none';
    document.getElementById('app').style.display='flex';
    render();
}

function render(filter=""){
    let el = document.getElementById('products');
    el.innerHTML="";

    db.items
    .filter(i => i.naziv.toLowerCase().includes(filter.toLowerCase()))
    .forEach(i=>{
        let d=document.createElement('div');
        d.className='product';
        d.innerText=i.naziv;
        d.onclick=()=>openItem(i);
        el.appendChild(d);
    });
}

function openItem(item){
    let qty=1;

    modal.innerHTML=`
    <div class="modal-box">
        <h2>${item.naziv}</h2>
        <p>${item.cena} WII</p>

        <div class="qty">
            <button onclick="change(-1)">-</button>
            <span id="q">${qty}</span>
            <button onclick="change(1)">+</button>
        </div>

        <button onclick="add()">Dodaj</button>
        <button onclick="closeModal()">Prekliči</button>
    </div>`;

    modal.style.display='flex';

    window.change=(n)=>{
        qty=Math.max(1,qty+n);
        document.getElementById('q').innerText=qty;
    }

    window.add=()=>{
        cart.push({...item, kol:qty});
        updateCount();
        closeModal();
    }
}

function closeModal(){
    modal.style.display='none';
}

function updateCount(){
    document.getElementById('count').innerText=cart.length;
}

function openCart(){
    let total=0;

    let html=`<div class="modal-box"><h2>Košarica</h2>`;

    cart.forEach((i,idx)=>{
        total+=i.cena*i.kol;

        html+=`
        <div>
            ${i.naziv} x${i.kol}
            <button onclick="remove(${idx})">🗑</button>
        </div>`;
    });

    html+=`<h3>${total.toFixed(2)} WII</h3>
    <button onclick="submit()">Oddaj naročilo</button>
    <button onclick="closeModal()">Nazaj</button>
    </div>`;

    modal.innerHTML=html;
    modal.style.display='flex';
}

function remove(i){
    cart.splice(i,1);
    openCart();
    updateCount();
}

function submit(){
    let id = db.orderSeq++;

    db.orders.push({
        id:id,
        date:new Date().toISOString(),
        items:cart.map(i=>({
            ...i,
            total:i.cena*i.kol
        })),
        total:cart.reduce((a,b)=>a+b.cena*b.kol,0),
        status:'NAROČENO'
    });

    localStorage.setItem('wii_db_v3',JSON.stringify(db));

    modal.style.display='none';
    document.getElementById('app').style.display='none';
    document.getElementById('success').style.display='flex';
    document.getElementById('orderId').innerText="Št: "+id;

    setTimeout(()=>{
        location.reload();
    },15000);
}

function resetOrder(){
    location.reload();
}
</script>

</body>
</html>
