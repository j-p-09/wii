<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WII Banka - Mobilna Aplikacija</title>

<!-- FIREBASE SCRIPTS -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
    :root {
        --bg-color: #f4f7f6;
        --primary: #0056b3;
        --text-main: #333;
        --card-bg: #ffffff;
        --danger: #dc3545;
        --success: #28a745;
    }

    * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
    body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    /* POGLED PRIJAVE */
    #login-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; }
    .login-box { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
    .login-box h2 { color: var(--primary); margin-bottom: 20px; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; }
    .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
    .login-box button:hover { background: #004494; }

    /* POGLED NADZORNE PLOŠČE (DASHBOARD) */
    #dashboard-view { display: none; width: 100%; max-width: 500px; flex-direction: column; height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    
    .header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }
    .header h3 { font-size: 18px; font-weight: normal; }
    .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

    .balance-card { margin: -10px 20px 20px 20px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; position: relative; z-index: 10; border: 1px solid #eee; }
    .balance-card p { color: #777; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .balance-card h1 { font-size: 40px; color: var(--primary); }

    .transactions-section { padding: 0 20px; flex: 1; overflow-y: auto; }
    .transactions-section h4 { margin-bottom: 15px; color: #555; font-size: 16px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    
    .transaction-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
    .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #ccc; }
    
    .transaction-item.expense { border-left-color: var(--danger); }
    .transaction-item.income { border-left-color: var(--success); }
    
    .trans-info { display: flex; flex-direction: column; }
    .trans-title { font-weight: bold; font-size: 15px; color: #333; }
    .trans-date { font-size: 12px; color: #888; margin-top: 3px; }
    .trans-amount { font-weight: bold; font-size: 16px; }
    .trans-amount.expense { color: var(--danger); }
    .trans-amount.income { color: var(--success); }
    
    .empty-state { text-align: center; color: #999; padding: 20px; font-style: italic; }

</style>
</head>
<body>

    <!-- PRIJAVA -->
    <div id="login-view">
        <div class="login-box">
            <h2>WII Banka</h2>
            <p style="margin-bottom: 15px; color: #666; font-size: 14px;">Vnesite številko kartice za dostop</p>
            <input type="password" id="card-pin" placeholder="Številka kartice (PIN)">
            <button onclick="login()">Vpiši me</button>
            <p id="login-error" style="color: red; margin-top: 10px; display: none; font-size: 14px;">Kartica ne obstaja!</p>
        </div>
    </div>

    <!-- NADZORNA PLOŠČA -->
    <div id="dashboard-view">
        <div class="header">
            <div>
                <p style="font-size: 12px; opacity: 0.8;">Dobrodošli,</p>
                <h3 id="user-name">Ime Uporabnika</h3>
            </div>
            <button class="btn-logout" onclick="logout()">Odjava</button>
        </div>

        <div class="balance-card">
            <p>Razpoložljivo stanje</p>
            <h1 id="user-balance">0.00 WII</h1>
        </div>

        <div class="transactions-section">
            <h4>Zadnje transakcije</h4>
            <div class="transaction-list" id="transactions-container">
                <!-- Transakcije se naložijo tukaj -->
            </div>
        </div>
    </div>

<script>
    /* ================= FIREBASE SETUP ================= */
    const firebaseConfig = {
        databaseURL: "https://wii-sh-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let loggedInUserId = null;
    let allUsers = [];

    // REAL-TIME POSLUŠANJE BAZE
    // Ta funkcija se sproži ob zagonu in NATO VSAKIČ, ko se v bazi karkoli spremeni (npr. ko blagajna potegne denar)
    database.ref('wii_db_v3/users').on('value', (snapshot) => {
        const users = snapshot.val();
        if (users) {
            allUsers = users;
            // Če smo že prijavljeni, takoj osvežimo prikaz na zaslonu
            if (loggedInUserId) {
                const me = allUsers.find(u => u.id === loggedInUserId);
                if (me) {
                    updateDashboardUI(me);
                }
            }
        }
    });

    // Funkcija za prijavo
    function login() {
        const pin = document.getElementById('card-pin').value;
        const user = allUsers.find(u => u.card === pin || u.id === pin);
        
        if (user) {
            loggedInUserId = user.id;
            document.getElementById('card-pin').value = '';
            document.getElementById('login-error').style.display = 'none';
            
            // Skrijemo prijavo, pokažemo banko
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'flex';
            
            // Posodobimo UI z uporabnikovimi podatki
            updateDashboardUI(user);
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    // Funkcija za odjavo
    function logout() {
        loggedInUserId = null;
        document.getElementById('dashboard-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'flex';
    }

    // Funkcija, ki dejansko nariše podatke na zaslon
    function updateDashboardUI(user) {
        document.getElementById('user-name').innerText = user.name;
        
        // STROGA PRETVORBA V ŠTEVILKO (parseFloat) prepreči napake na blagajni
        let currentBalance = parseFloat(user.bankBalance || 0);
        document.getElementById('user-balance').innerText = currentBalance.toFixed(2) + ' WII';

        const container = document.getElementById('transactions-container');
        container.innerHTML = '';

        if (!user.transactions || user.transactions.length === 0) {
            container.innerHTML = '<div class="empty-state">Trenutno nimate zabeleženih transakcij.</div>';
            return;
        }

        // Kopiramo in obrnemo vrstni red transakcij (najnovejše zgoraj)
        let txs = [...user.transactions].reverse();

        txs.forEach(tx => {
            let amount = parseFloat(tx.amount || 0);
            let isExpense = amount < 0;
            
            // PREVERJANJE ZA WII SHOP BLAGAJNO: 
            // Če je transakcija s POS blagajne, vsilimo naslov, ki ga zahtevaš.
            let displayTitle = tx.description;
            if (tx.type === 'POS_PAYMENT') {
                displayTitle = "PLAČILO POS WII SHOP";
            }

            let dateStr = new Date(tx.date).toLocaleString('sl-SI', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });

            // Ustvarimo element za seznam
            let div = document.createElement('div');
            div.className = `transaction-item ${isExpense ? 'expense' : 'income'}`;
            
            div.innerHTML = `
                <div class="trans-info">
                    <span class="trans-title">${displayTitle}</span>
                    <span class="trans-date">${dateStr}</span>
                </div>
                <div class="trans-amount ${isExpense ? 'expense' : 'income'}">
                    ${isExpense ? '' : '+'}${amount.toFixed(2)} WII
                </div>
            `;
            
            container.appendChild(div);
        });
    }

    // Dodatek za Enter tipko ob prijavi
    document.getElementById('card-pin').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { login(); }
    });
</script>
</body>
</html>
