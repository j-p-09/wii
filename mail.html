<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Wii Mail - Outlook Retro</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://wii-sh-default-rtdb.europe-west1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Zvočni efekt
        const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        function playAlert() { audio.play(); setTimeout(() => audio.play(), 300); }

        // Poslušanje sprememb v realnem času
        const mailRef = ref(db, 'emails/');
        onValue(mailRef, (snapshot) => {
            const data = snapshot.val();
            console.log("Novo sporočilo:", data);
            playAlert();
            // Tukaj dodaš kodo za osvežitev seznama v HTML
        });
    </script>
    <style>
        body { background-color: #c0c0c0; font-family: Tahoma, sans-serif; font-size: 12px; margin: 0; }
        .window { border: 2px outset #fff; background: #c0c0c0; width: 800px; margin: 20px auto; }
        .title-bar { background: #000080; color: white; padding: 3px; font-weight: bold; }
        .menu-bar { background: #c0c0c0; border-bottom: 1px solid #808080; padding: 5px; }
        .toolbar { padding: 5px; border-bottom: 2px groove #fff; }
        .main-content { display: flex; height: 400px; }
        .sidebar { width: 200px; border-right: 2px inset #fff; padding: 10px; }
        .inbox { flex: 1; padding: 10px; background: white; }
        button { border: 1px outset #fff; padding: 2px 10px; background: #c0c0c0; cursor: pointer; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">Wii Mail - Prejeto</div>
    <div class="menu-bar">Datoteka | Uredi | Pogled | Orodja</div>
    <div class="toolbar">
        <button>Novo sporočilo</button>
        <button>Odgovori</button>
        <button>Izbriši</button>
    </div>
    <div class="main-content">
        <div class="sidebar">
            <strong>Mape:</strong><br>
            - Prejeto (@wii.shop)<br>
            - Poslano<br>
            - Osnutki
        </div>
        <div class="inbox" id="inbox">
            <table width="100%" border="1">
                <tr><th>Od</th><th>Zadeva</th><th>Datum</th></tr>
                </table>
        </div>
    </div>
</div>

</body>
</html>
