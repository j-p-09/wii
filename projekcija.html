<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WII - Zaslon za goste</title>
<style>
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
    }
    
    body { 
        background-color: #ffffff; 
        color: #000000; 
        font-family: 'Arial Narrow', Arial, sans-serif;
        height: 100vh; 
        display: flex; 
        flex-direction: row; /* Razdeli zaslon levo-desno */
        overflow: hidden; 
    }

    /* =========================================
       LEVA STRAN (2/3) - Glavni blagajniški del
       ========================================= */
    #main-content {
        flex: 2; /* Zavzame 2/3 prostora */
        padding: 40px;
        position: relative; /* Da lahko damo overlay čez ta specifičen del */
        display: flex;
        flex-direction: column;
    }

    #welcome-view {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        text-align: center;
        animation: fadeInPulse 3s infinite alternate ease-in-out;
    }

    @keyframes fadeInPulse {
        0% { transform: scale(0.95); opacity: 0.7; }
        100% { transform: scale(1.05); opacity: 1; }
    }

    #welcome-view h1 {
        font-size: 80px;
        letter-spacing: 4px;
        font-weight: bold;
        color: #333;
    }

    #main-view {
        display: none; 
        flex-direction: column;
        height: 100%;
    }

    .customer-header {
        font-size: 24px;
        margin-bottom: 20px;
        font-weight: normal;
    }
    .customer-header span {
        font-weight: bold;
    }

    .cart-container {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 20px;
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
    }

    td { 
        padding: 8px 0; 
        font-size: 20px;
        font-weight: normal;
        border-bottom: 1px solid #eee;
    }

    tr.last-scanned-item td {
        font-size: 30px;
        font-weight: bold;
        border-bottom: 2px solid #000;
        padding: 15px 0;
    }

    #payment-section {
        display: none;
        border-top: 3px dashed #000000;
        padding-top: 20px;
        margin-top: auto; /* Potisne izračun na dno */
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 22px;
        margin-bottom: 5px;
    }

    .total-row {
        display: flex;
        justify-content: space-between;
        font-size: 45px;
        font-weight: bold;
        margin-top: 15px;
    }

    /* ZAHVALA - Sedaj samo prekriva glavno vsebino (prosojno) */
    #overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.85); /* Rahlo prosojno bela */
        backdrop-filter: blur(4px); /* Zamegli ozadje, artikli so še vidni */
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        text-align: center;
    }

    #overlay-content {
        background: #fff;
        padding: 40px 60px;
        border: 4px solid #000;
        animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    #overlay h1 { font-size: 60px; font-weight: bold; margin-bottom: 10px; color: #000; }
    #overlay p { font-size: 28px; color: #333; }

    /* =========================================
       DESNA STRAN (1/3) - Stranski panel z uro
       ========================================= */
    #side-panel {
        flex: 1; /* Zavzame 1/3 prostora */
        background-color: #f7f7f7;
        border-left: 2px solid #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        text-align: center;
    }

    .side-brand {
        font-size: 40px;
        font-weight: bold;
        letter-spacing: 2px;
        margin-bottom: 40px;
        color: #222;
    }

    .side-clock {
        font-size: 70px;
        font-weight: bold;
        color: #000;
        line-height: 1;
    }

    .side-date {
        font-size: 24px;
        color: #666;
        margin-top: 10px;
        margin-bottom: 50px;
    }

    .side-message {
        font-size: 22px;
        color: #555;
        font-style: italic;
    }
</style>
</head>
<body>

    <div id="main-content">
        
        <div id="welcome-view">
            <h1>DOBRODOŠLI</h1>
        </div>

        <div id="main-view">
            <div class="customer-header">
                Kupec: <span id="display-customer">-</span>
            </div>

            <div class="cart-container">
                <table>
                    <tbody id="display-cart">
                        </tbody>
                </table>
            </div>

            <div id="payment-section">
                <div class="info-row">
                    <div>Popust:</div>
                    <div><span id="display-discount">0.00</span> WII</div>
                </div>
                <div class="info-row" id="status-row">
                    <div id="status-label">Stanje:</div>
                    <div id="display-remaining">0.00 WII</div>
                </div>
                <div class="total-row">
                    <div>SKUPAJ:</div>
                    <div><span id="display-total">0.00</span> WII</div>
                </div>
            </div>
        </div>

        <div id="overlay">
            <div id="overlay-content">
                <h1>HVALA ZA NAROČILO!</h1>
                <p>Nasvidenje!</p>
            </div>
        </div>
    </div>

    <div id="side-panel">
        <div class="side-brand">WII SHOP</div>
        <div class="side-clock" id="live-clock">00:00</div>
        <div class="side-date" id="live-date">--.--.----</div>
        <div class="side-message">Hvala, ker nakupujete pri nas.</div>
    </div>

<script>
    // Posodabljanje ure na stranskem panelu
    function updateClock() {
        const zdaj = new Date();
        document.getElementById('live-clock').innerText = zdaj.toLocaleTimeString('sl-SI', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('live-date').innerText = zdaj.toLocaleDateString('sl-SI');
    }
    setInterval(updateClock, 1000);
    updateClock(); // Prvi klic ob zagonu

    // Poslušalec za podatke blagajne
    window.addEventListener('storage', (e) => {
        if (e.key === 'wii_projekcija_data') {
            const data = JSON.parse(e.newValue);
            posodobiPrikaz(data);
        }
    });

    function posodobiPrikaz(data) {
        const welcomeView = document.getElementById('welcome-view');
        const mainView = document.getElementById('main-view');
        const paymentSection = document.getElementById('payment-section');
        const overlay = document.getElementById('overlay');
        const tbody = document.getElementById('display-cart');

        const status = data.status || 'buying';
        const cart = data.cart || [];

        // KORAK 1: KONČANO (Zahvala)
        // POMEMBNO: Ne skrijemo mainView, tako da artikli ostanejo na ekranu!
        if (status === 'finished') {
            welcomeView.style.display = "none";
            mainView.style.display = "flex"; 
            overlay.style.display = "flex"; // Prikaže se prosojno preko artiklov
            
            setTimeout(() => {
                location.reload(); 
            }, 5000);
            return;
        }

        // KORAK 2: NAKUPOVANJE - Če je prazna košarica
        if (status === 'buying' && cart.length === 0) {
            welcomeView.style.display = "flex";
            mainView.style.display = "none";
            paymentSection.style.display = "none";
            overlay.style.display = "none";
            return;
        }

        // KORAK 3: PRIKAZ PODATKOV 
        welcomeView.style.display = "none";
        mainView.style.display = "flex";
        overlay.style.display = "none";

        document.getElementById('display-customer').innerText = data.customer || "Gost";

        // Tabelaričen izpis artiklov
        tbody.innerHTML = '';
        cart.forEach((item, index) => {
            const tr = document.createElement('tr');
            if (index === cart.length - 1 && status === 'buying') {
                tr.className = 'last-scanned-item';
            }

            tr.innerHTML = `
                <td>${item.naziv}</td>
                <td style="text-align: center; width: 15%;">x${item.kol}</td>
                <td style="text-align: right; width: 25%;">${item.total.toFixed(2)} WII</td>
            `;
            tbody.appendChild(tr);
        });

        // Avtomatski premik na dno tabele
        const cartContainer = document.querySelector('.cart-container');
        if (cartContainer) cartContainer.scrollTop = cartContainer.scrollHeight;

        // KORAK 4: UPRAVLJANJE PLAČILNEGA DELA (Črtkana črta)
        if (status === 'payment') {
            paymentSection.style.display = "block";
            
            document.getElementById('display-total').innerText = data.total || "0.00";
            
            // Popravljeno zaznavanje popusta (preveri obe možni imeni)
            const popustVrednost = data.popust !== undefined ? data.popust : (data.discount || "0.00");
            document.getElementById('display-discount').innerText = popustVrednost; 

            const statusLabel = document.getElementById('status-label');
            const remainingDiv = document.getElementById('display-remaining');

            if (parseFloat(data.change) > 0) {
                statusLabel.innerText = "VRAČILO:";
                remainingDiv.innerHTML = `<span style="color: green; font-weight: bold;">${data.change} WII</span>`;
            } else {
                statusLabel.innerText = "ŠE ZA PLAČILO:";
                remainingDiv.innerHTML = `<span style="color: red; font-weight: bold;">${data.remaining} WII</span>`;
            }
        } else {
            paymentSection.style.display = "none";
        }
    }

    // Inicializacija ob osvežitvi
    window.onload = () => {
        const initialData = localStorage.getItem('wii_projekcija_data');
        if (initialData) {
            posodobiPrikaz(JSON.parse(initialData));
        } else {
            document.getElementById('welcome-view').style.display = "flex";
            document.getElementById('main-view').style.display = "none";
        }
    };
</script>
</body>
</html>
