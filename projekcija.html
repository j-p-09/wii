<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WII - Zaslon za goste</title>
<style>
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
    }
    
    body { 
        background-color: #ffffff; 
        color: #000000; 
        font-family: 'Arial Narrow', Arial, sans-serif;
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        justify-content: flex-start; /* Prepreči razpotegnjenost - elementi se zlagajo od zgoraj */
        overflow: hidden; 
        padding: 40px;
    }

    /* =========================================
       1. ZAČETNO STANJE Z ANIMACIJO
       ========================================= */
    #welcome-view {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        text-align: center;
        animation: fadeInPulse 3s infinite alternate ease-in-out;
    }

    @keyframes fadeInPulse {
        0% { transform: scale(0.95); opacity: 0.7; }
        100% { transform: scale(1.05); opacity: 1; }
    }

    #welcome-view h1 {
        font-size: 80px;
        letter-spacing: 4px;
        font-weight: bold;
        color: #333;
    }

    /* =========================================
       2. GLAVNI POGLED (Nakup in plačilo)
       ========================================= */
    #main-view {
        display: none; 
        flex-direction: column;
        max-height: 100%;
    }

    .customer-header {
        font-size: 24px;
        margin-bottom: 20px;
        font-weight: normal;
    }
    .customer-header span {
        font-weight: bold;
    }

    .cart-container {
        /* Omogoča scrollanje, če je preveč artiklov, ampak ne sili v širjenje */
        overflow-y: auto;
        margin-bottom: 20px;
        max-height: 60vh; 
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
    }

    td { 
        padding: 8px 0; 
        font-family: 'Arial Narrow', sans-serif;
        font-size: 20px;
        font-weight: normal;
        border-bottom: 1px solid #eee;
    }

    /* ZADNJI SKENIRAN ARTIKEL: Krepek in povečan */
    tr.last-scanned-item td {
        font-size: 30px;
        font-weight: bold;
        border-bottom: 2px solid #000;
        padding: 15px 0;
    }

    /* SPODNJI DEL: Črtkana črta in izračun ob plačilu */
    #payment-section {
        display: none;
        border-top: 3px dashed #000000;
        padding-top: 20px;
        margin-top: 10px;
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 22px;
        margin-bottom: 5px;
    }

    .total-row {
        display: flex;
        justify-content: space-between;
        font-size: 45px;
        font-weight: bold;
        margin-top: 15px;
    }

    /* =========================================
       3. ZAHVALA Z ANIMACIJO
       ========================================= */
    #overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #ffffff;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        text-align: center;
    }

    #overlay-content {
        animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
        0% { transform: scale(0.5) translateY(50px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    #overlay h1 { 
        font-size: 70px; 
        font-weight: bold;
        margin-bottom: 15px; 
        color: #000;
    }
    
    #overlay p {
        font-size: 30px;
        color: #555;
    }
</style>
</head>
<body>

    <div id="welcome-view">
        <h1>DOBRODOŠLI</h1>
    </div>

    <div id="main-view">
        <div class="customer-header">
            Kupec: <span id="display-customer">-</span>
        </div>

        <div class="cart-container">
            <table>
                <tbody id="display-cart">
                    </tbody>
            </table>
        </div>

        <div id="payment-section">
            <div class="info-row">
                <div>Popust:</div>
                <div><span id="display-discount">0.00</span> WII</div>
            </div>
            <div class="info-row" id="status-row">
                <div id="status-label">Stanje:</div>
                <div id="display-remaining">0.00 WII</div>
            </div>
            <div class="total-row">
                <div>SKUPAJ:</div>
                <div><span id="display-total">0.00</span> WII</div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-content">
            <h1>HVALA ZA NAROČILO!</h1>
            <p>Nasvidenje!</p>
        </div>
    </div>

<script>
    window.addEventListener('storage', (e) => {
        if (e.key === 'wii_projekcija_data') {
            const data = JSON.parse(e.newValue);
            posodobiPrikaz(data);
        }
    });

    function posodobiPrikaz(data) {
        const welcomeView = document.getElementById('welcome-view');
        const mainView = document.getElementById('main-view');
        const paymentSection = document.getElementById('payment-section');
        const overlay = document.getElementById('overlay');
        const tbody = document.getElementById('display-cart');

        const status = data.status || 'buying';
        const cart = data.cart || [];

        // KORAK 1: KONČANO (Zahvala)
        if (status === 'finished') {
            welcomeView.style.display = "none";
            mainView.style.display = "none";
            overlay.style.display = "flex";
            
            setTimeout(() => {
                location.reload(); 
            }, 5000);
            return;
        }

        // KORAK 2: NAKUPOVANJE - Če je prazna košarica
        if (status === 'buying' && cart.length === 0) {
            welcomeView.style.display = "flex";
            mainView.style.display = "none";
            paymentSection.style.display = "none";
            overlay.style.display = "none";
            return;
        }

        // KORAK 3: PRIKAZ PODATKOV (Bodisi med nakupovanjem bodisi med plačilom)
        welcomeView.style.display = "none";
        mainView.style.display = "flex";
        overlay.style.display = "none";

        // Posodobi kupca
        document.getElementById('display-customer').innerText = data.customer || "Gost";

        // Posodobi artikle v tabeli
        tbody.innerHTML = '';
        cart.forEach((item, index) => {
            const tr = document.createElement('tr');
            if (index === cart.length - 1 && status === 'buying') {
                tr.className = 'last-scanned-item'; // Poudari samo, če smo še v fazi nakupovanja
            }

            tr.innerHTML = `
                <td>${item.naziv}</td>
                <td style="text-align: center; width: 15%;">x${item.kol}</td>
                <td style="text-align: right; width: 25%;">${item.total.toFixed(2)} WII</td>
            `;
            tbody.appendChild(tr);
        });

        // Avtomatski premik na dno tabele
        const cartContainer = document.querySelector('.cart-container');
        if (cartContainer) cartContainer.scrollTop = cartContainer.scrollHeight;

        // KORAK 4: UPRAVLJANJE PLAČILNEGA DELA (Črtkana črta)
        if (status === 'payment') {
            paymentSection.style.display = "block";
            
            document.getElementById('display-total').innerText = data.total || "0.00";
            document.getElementById('display-discount').innerText = data.popust || "0.00"; 

            const statusLabel = document.getElementById('status-label');
            const remainingDiv = document.getElementById('display-remaining');

            if (parseFloat(data.change) > 0) {
                statusLabel.innerText = "VRAČILO:";
                remainingDiv.innerHTML = `<span style="color: green; font-weight: bold;">${data.change} WII</span>`;
            } else {
                statusLabel.innerText = "ŠE ZA PLAČILO:";
                remainingDiv.innerHTML = `<span style="color: red; font-weight: bold;">${data.remaining} WII</span>`;
            }
        } else {
            // Skrij črtkano črto, če samo skeniramo
            paymentSection.style.display = "none";
        }
    }

    // Inicializacija
    window.onload = () => {
        const initialData = localStorage.getItem('wii_projekcija_data');
        if (initialData) {
            posodobiPrikaz(JSON.parse(initialData));
        } else {
            document.getElementById('welcome-view').style.display = "flex";
            document.getElementById('main-view').style.display = "none";
        }
    };
</script>
</body>
</html>
