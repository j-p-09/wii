<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WII - Zaslon za goste</title>
<style>
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
    }
    
    body { 
        background-color: #ffffff; 
        color: #000000; 
        font-family: 'Arial Narrow', Arial, sans-serif;
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
        padding: 30px;
    }

    /* 1. ZAČETNO STANJE: Dobrodošli */
    #welcome-view {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
    #welcome-view h1 {
        font-size: 80px;
        letter-spacing: 2px;
        font-weight: bold;
    }

    /* GLAVNI POGLED (Ko se začne nakup) */
    #main-view {
        display: none; /* Se prikaže šele ob prvem artiklu */
        flex-direction: column;
        height: 100%;
    }

    /* Zgoraj levo: Kupec */
    .customer-header {
        font-size: 24px;
        margin-bottom: 30px;
        font-weight: normal;
    }
    .customer-header span {
        font-weight: bold;
    }

    /* Sredina: Seznam artiklov */
    .cart-container {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 20px;
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
    }

    /* Navadni artikli: Arial Narrow, 20px */
    td { 
        padding: 12px 0; 
        font-family: 'Arial Narrow', sans-serif;
        font-size: 20px;
        font-weight: normal;
        border-bottom: 1px solid #eee;
    }

    /* ZADNJI SKENIRAN ARTIKEL: Krepek in povečan */
    tr.last-scanned-item td {
        font-size: 30px;
        font-weight: bold;
        border-bottom: 2px solid #000;
    }

    /* SPODNJI DEL: Črtkana črta in izračun ob plačilu */
    #payment-section {
        display: none; /* Skrito med skeniranjem, prikaže se ob plačilu */
        border-top: 3px dashed #000000;
        padding-top: 20px;
        margin-top: 10px;
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 22px;
        margin-bottom: 8px;
    }

    .total-row {
        display: flex;
        justify-content: space-between;
        font-size: 45px;
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 10px;
    }

    /* Posebna stanja (Zahvala) */
    #overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #ffffff;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        text-align: center;
    }
    #overlay h1 { 
        font-size: 70px; 
        font-weight: bold;
        margin-bottom: 10px; 
    }
    #overlay p {
        font-size: 30px;
    }
</style>
</head>
<body>

    <div id="welcome-view">
        <h1>DOBRODOŠLI</h1>
    </div>

    <div id="main-view">
        <div class="customer-header">
            Kupec: <span id="display-customer">-</span>
        </div>

        <div class="cart-container">
            <table>
                <tbody id="display-cart">
                    </tbody>
            </table>
        </div>

        <div id="payment-section">
            <div class="info-row">
                <div>Popust:</div>
                <div><span id="display-discount">0.00</span> WII</div>
            </div>
            <div class="info-row" id="status-row">
                <div id="status-label">Stanje:</div>
                <div id="display-remaining">0.00 WII</div>
            </div>
            <div class="total-row">
                <div>SKUPAJ ZA PLAČILO:</div>
                <div><span id="display-total">0.00</span> WII</div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-content">
            <h1>HVALA ZA NAROČILO!</h1>
            <p>Nasvidenje!</p>
        </div>
    </div>

<script>
    window.addEventListener('storage', (e) => {
        if (e.key === 'wii_projekcija_data') {
            const data = JSON.parse(e.newValue);
            posodobiPrikaz(data);
        }
    });

    function posodobiPrikaz(data) {
        const welcomeView = document.getElementById('welcome-view');
        const mainView = document.getElementById('main-view');
        const paymentSection = document.getElementById('payment-section');
        const overlay = document.getElementById('overlay');

        // KORAK 1: Stanje KONČANO (Zahvala za naročilo)
        if (data.status === 'finished') {
            welcomeView.style.display = "none";
            mainView.style.display = "none";
            overlay.style.display = "flex";
            
            setTimeout(() => {
                location.reload(); 
            }, 5000);
            return;
        }

        // KORAK 2: Preverjanje, če je košarica prazna (prikaže Dobrodošli)
        if (!data.cart || data.cart.length === 0) {
            welcomeView.style.display = "flex";
            mainView.style.display = "none";
            paymentSection.style.display = "none";
            overlay.style.display = "none";
            return;
        }

        // Če so artikli, skrijemo Dobrodošli in prikažemo glavni pogled
        welcomeView.style.display = "none";
        mainView.style.display = "flex";

        // Posodobi podatke o kupcu
        document.getElementById('display-customer').innerText = data.customer || "Gost";

        // Izpis artiklov enega po enega
        const tbody = document.getElementById('display-cart');
        tbody.innerHTML = '';
        
        data.cart.forEach((item, index) => {
            const tr = document.createElement('tr');
            
            // Če je to zadnji skenirani izdelek v matriki, dodamo poseben razred za povečavo in krepko pisavo
            if (index === data.cart.length - 1) {
                tr.className = 'last-scanned-item';
            }

            tr.innerHTML = `
                <td>${item.naziv}</td>
                <td style="text-align: center; width: 15%;">x${item.kol}</td>
                <td style="text-align: right; width: 25%;">${item.total.toFixed(2)} WII</td>
            `;
            tbody.appendChild(tr);
        });

        // Samodejno premikanje na dno ob novem skeniranju
        const cartContainer = document.querySelector('.cart-container');
        cartContainer.scrollTop = cartContainer.scrollHeight;

        // KORAK 3: Stanje NAKUPOVANJA (buying) -> Skrij izračun cen pod črto
        if (data.status === 'buying') {
            paymentSection.style.display = "none";
            overlay.style.display = "none";
        }

        // KORAK 4: Stanje PLAČEVANJA (payment) -> Prikaži črtkano črto in izračunaj cene
        if (data.status === 'payment') {
            paymentSection.style.display = "block";
            overlay.style.display = "none";

            // Izračun zneskov
            document.getElementById('display-total').innerText = data.total;
            document.getElementById('display-discount').innerText = data.popust || "0.00"; // Izpiše popust, če obstaja v podatkih

            const statusLabel = document.getElementById('status-label');
            const remainingDiv = document.getElementById('display-remaining');

            if (parseFloat(data.change) > 0) {
                statusLabel.innerText = "VRAČILO:";
                remainingDiv.innerHTML = `<span style="color: green; font-weight: bold;">${data.change} WII</span>`;
            } else {
                statusLabel.innerText = "ŠE ZA PLAČILO:";
                remainingDiv.innerHTML = `<span style="color: red; font-weight: bold;">${data.remaining} WII</span>`;
            }
        }
    }

    // Preverjanje obstoječih podatkov ob nalaganju
    window.onload = () => {
        const initialData = localStorage.getItem('wii_projekcija_data');
        if (initialData) {
            posodobiPrikaz(JSON.parse(initialData));
        } else {
            // Če ni podatkov sploh, pokaži samo Dobrodošli
            document.getElementById('welcome-view').style.display = "flex";
            document.getElementById('main-view').style.display = "none";
        }
    };
</script>
</body>
</html>
