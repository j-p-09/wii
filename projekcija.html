<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WII - Zaslon za goste</title>
<style>
    :root {
        --pos-bg: #d4d0c8;
        --pos-panel: #ece9d8;
        --pos-blue: #3a6ea5;
        --pos-text: #000000;
    }

    * { box-sizing: border-box; font-family: 'Times New Roman', Times, serif; margin: 0; padding: 0; }
    body { background-color: var(--pos-bg); color: var(--pos-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header {
        background: var(--pos-blue);
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        border-bottom: 4px ridge #fff;
    }

    .main-container {
        flex: 1;
        display: flex;
        padding: 20px;
        gap: 20px;
        overflow: hidden;
    }

    /* Leva stran: Seznam artiklov */
    .cart-container {
        flex: 2;
        background: white;
        border: 3px inset #808080;
        display: flex;
        flex-direction: column;
    }

    table { width: 100%; border-collapse: collapse; font-size: 24px; }
    th { background: #d4d0c8; padding: 15px; border: 1px solid #808080; text-align: left; }
    td { padding: 15px; border-bottom: 1px solid #ccc; }
    .tr-header { position: sticky; top: 0; }

    /* Desna stran: Info in Total */
    .info-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .box {
        background: var(--pos-panel);
        border: 3px outset #fff;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .label { font-size: 20px; color: #444; margin-bottom: 5px; }
    .value { font-size: 30px; font-weight: bold; }

    .total-box {
        background: #000;
        color: #00ff00;
        text-align: right;
        padding: 30px;
        border: 5px inset #808080;
    }
    .total-label { font-size: 24px; margin-bottom: 10px; }
    .total-amount { font-size: 70px; font-family: 'Courier New', monospace; }

    /* Posebna stanja (Plačilo, Hvala) */
    #overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: var(--pos-bg);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        text-align: center;
    }
    #overlay h1 { font-size: 80px; margin-bottom: 20px; }
    #overlay p { font-size: 40px; }

    .payment-info { font-size: 40px; margin: 10px; }
    .change-amount { color: #008800; font-weight: bold; font-size: 60px; }
</style>
</head>
<body>

    <div class="header">WII SHOP - DOBRODOŠLI</div>

    <div class="main-container" id="main-view">
        <div class="cart-container">
            <table>
                <thead>
                    <tr class="tr-header">
                        <th>Artikel</th>
                        <th style="text-align: center;">Kol.</th>
                        <th style="text-align: right;">Cena (WII)</th>
                    </tr>
                </thead>
                <tbody id="display-cart">
                    </tbody>
            </table>
        </div>

        <div class="info-container">
            <div class="box">
                <div class="label">STRANKA:</div>
                <div id="display-customer" class="value">-</div>
            </div>
            
            <div class="total-box">
                <div class="total-label">ZA PLAČILO</div>
                <div id="display-total" class="total-amount">0.00</div>
            </div>
            
            <div id="payment-status-box" class="box" style="display:none; background: #ffffcc;">
                <div class="label">STANJE PLAČILA:</div>
                <div id="display-remaining" class="value" style="color: red;"></div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-content"></div>
    </div>

<script>
    // Poslušaj spremembe iz blagajne (WII.html)
    window.addEventListener('storage', (e) => {
        if (e.key === 'wii_projekcija_data') {
            const data = JSON.parse(e.newValue);
            posodobiPrikaz(data);
        }
    });

    function posodobiPrikaz(data) {
        const overlay = document.getElementById('overlay');
        const overlayContent = document.getElementById('overlay-content');
        const mainView = document.getElementById('main-view');
        const payBox = document.getElementById('payment-status-box');

        // 1. Stanje: KONČANO (Hvala za nakup)
        if (data.status === 'finished') {
            mainView.style.opacity = "0.2";
            overlay.style.display = "flex";
            overlayContent.innerHTML = `
                <h1>HVALA!</h1>
                <p>Vaš nakup je bil uspešen.</p>
                <p style="margin-top:20px; font-size: 20px;">Nasvidenje!</p>
            `;
            // Po 5 sekundah resetiraj na osnovni pogled
            setTimeout(() => {
                location.reload(); 
            }, 5000);
            return;
        }

        // 2. Stanje: PLAČEVANJE
        if (data.status === 'payment') {
            overlay.style.display = "none";
            mainView.style.opacity = "1";
            payBox.style.display = "block";
            
            document.getElementById('display-total').innerText = data.total;
            document.getElementById('display-remaining').innerText = `Še za plačilo: ${data.remaining} WII`;
            
            if (parseFloat(data.change) > 0) {
                document.getElementById('display-remaining').innerHTML = `VRAČILO:<br><span class="change-amount">${data.change} WII</span>`;
            }
        }

        // 3. Stanje: NAKUPOVANJE (buying)
        if (data.status === 'buying') {
            overlay.style.display = "none";
            mainView.style.opacity = "1";
            payBox.style.display = "none";

            // Posodobi stranko
            document.getElementById('display-customer').innerText = data.customer || "Gost";

            // Posodobi tabelo
            const tbody = document.getElementById('display-cart');
            tbody.innerHTML = '';
            data.cart.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.naziv}</td>
                    <td style="text-align: center;">${item.kol}</td>
                    <td style="text-align: right;">${item.total.toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });

            // Posodobi total
            document.getElementById('display-total').innerText = data.total;
        }
    }

    // Ob prvem nalaganju preveri, če so že kakšni podatki
    window.onload = () => {
        const initialData = localStorage.getItem('wii_projekcija_data');
        if (initialData) posodobiPrikaz(JSON.parse(initialData));
    };
</script>
</body>
</html>
