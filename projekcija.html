<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>WII - Zaslon za stranke</title>
<style>
    /* ISTI DIZAJN KOT V WII.HTML */
    :root {
        --pos-bg: #d4d0c8;
        --pos-panel: #ece9d8;
        --pos-border-light: #ffffff;
        --pos-border-dark: #808080;
        --pos-border-darker: #404040;
        --pos-blue: #3a6ea5;
        --pos-text: #000000;
    }

    * { box-sizing: border-box; font-family: 'Times New Roman', Times, serif !important; margin: 0; padding: 0; user-select: none; }
    body { background-color: var(--pos-bg); color: var(--pos-text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 10px; }

    /* OKVIRJI */
    .box-frame { 
        background: var(--pos-panel); 
        padding: 15px; 
        border-top: 2px solid var(--pos-border-dark); 
        border-left: 2px solid var(--pos-border-dark); 
        border-right: 2px solid var(--pos-border-light); 
        border-bottom: 2px solid var(--pos-border-light); 
        margin-bottom: 10px;
    }

    /* STATUS (DOBRODOŠLI / ZAPRTO) */
    .status-header {
        background: var(--pos-blue);
        color: white;
        padding: 10px;
        font-size: 32px;
        text-align: center;
        font-weight: bold;
        border: 2px inset #fff;
    }

    /* TABELA ARTIKLOV */
    .table-container { 
        flex: 1; 
        overflow-y: auto; 
        background: white; 
        border: 2px inset #808080; 
        margin: 10px 0;
    }
    table { width: 100%; border-collapse: collapse; font-size: 24px; }
    th { background: #d4d0c8; border: 1px outset #fff; padding: 8px; position: sticky; top: 0; }
    td { border-bottom: 1px solid #ccc; padding: 10px; }
    .text-right { text-align: right; }

    /* SPODNJI DEL (TOTAL) */
    .receipt-total { 
        text-align: right; 
        background: #e0e0e0; 
        padding: 20px;
        border-top: 2px solid var(--pos-border-dark);
    }
    .receipt-total h1 { font-size: 60px; margin: 0; letter-spacing: 2px; }

    /* PLAČILO INFO */
    .payment-box {
        display: none;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 10px;
        font-size: 24px;
        font-weight: bold;
    }
    .pay-detail {
        background: #ccffcc;
        padding: 10px;
        border: 2px inset #808080;
    }
    .vracilo-label { color: #006600; font-size: 30px; }

    /* SKRITO */
    .hidden { display: none !important; }
</style>
</head>
<body>

    <div id="status-display" class="status-header">DOBRODOŠLI</div>

    <div id="main-content" class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="70%">Artikel</th>
                    <th width="30%" class="text-right">Znesek (WII)</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                </tbody>
        </table>
    </div>

    <div class="box-frame receipt-total">
        <div style="font-size: 20px;">ZA PLAČILO:</div>
        <h1 id="total-amount">0.00 WII</h1>
        
        <div id="payment-info" class="payment-box">
            <div class="pay-detail">
                PLAČANO (<span id="pay-method">GOTOVINA</span>):<br>
                <span id="pay-received">0.00</span> WII
            </div>
            <div class="pay-detail vracilo-label">
                VRAČILO:<br>
                <span id="pay-change">0.00</span> WII
            </div>
        </div>
    </div>

<script>
    function updateDisplay() {
        // Preberemo stanje iz localStorage, ki ga pošilja glavna blagajna
        const rawData = localStorage.getItem('wii_live_state');
        if (!rawData) return;
        
        const state = JSON.parse(rawData);
        const statusEl = document.getElementById('status-display');
        const cartTbody = document.getElementById('cart-items');
        const totalEl = document.getElementById('total-amount');
        const payBox = document.getElementById('payment-info');

        // 1. Logika za ZAPRTO / PROSTO
        if (state.status === 'zaprto') {
            statusEl.innerText = "ZAPRTO";
            statusEl.style.background = "#800000"; // Temno rdeča
            cartTbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:50px; color:#808080;">Blagajna trenutno ne obratuje.</td></tr>';
            totalEl.innerText = "0.00 WII";
            payBox.style.display = "none";
            return;
        } else {
            statusEl.innerText = "DOBRODOŠLI";
            statusEl.style.background = "#3a6ea5"; // Original modra
        }

        // 2. Osveževanje artiklov
        let itemsHtml = "";
        state.cart.forEach(item => {
            if (item.naziv || item.koda) {
                itemsHtml += `
                    <tr>
                        <td>${item.naziv || 'Artikel'}</td>
                        <td class="text-right">${item.total.toFixed(2)}</td>
                    </tr>`;
            }
        });
        
        if (itemsHtml === "") {
            itemsHtml = '<tr><td colspan="2" style="text-align:center; padding:50px; color:#808080;">Pripravljeni na nov nakup...</td></tr>';
        }
        cartTbody.innerHTML = itemsHtml;

        // 3. Skupni znesek
        totalEl.innerText = state.total.toFixed(2) + " WII";

        // 4. Prikaz plačila in vračila
        if (state.status === 'placilo' || state.paid > 0) {
            payBox.style.display = "grid";
            document.getElementById('pay-method').innerText = (state.method || "GOTOVINA").toUpperCase();
            document.getElementById('pay-received').innerText = state.paid.toFixed(2);
            document.getElementById('pay-change').innerText = state.change.toFixed(2);
        } else {
            payBox.style.display = "none";
        }
    }

    // Preverja spremembe vsakih 300ms
    setInterval(updateDisplay, 300);
</script>
</body>
</html>
