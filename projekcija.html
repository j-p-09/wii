<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaslon za goste</title>
<style>
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
    }
    
    body { 
        background-color: #ffffff; 
        color: #000000; 
        font-family: 'Arial Narrow', Arial, sans-serif;
        height: 100vh; 
        display: flex; 
        flex-direction: row; 
        overflow: hidden; 
    }

    /* =========================================
       LEVA STRAN (2/3) - Glavni blagajniški del
       ========================================= */
    #main-content {
        flex: 2; 
        padding: 40px;
        position: relative; 
        display: flex;
        flex-direction: column;
    }

    #welcome-view {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        text-align: center;
        animation: fadeInPulse 3s infinite alternate ease-in-out;
    }

    @keyframes fadeInPulse {
        0% { transform: scale(0.95); opacity: 0.7; }
        100% { transform: scale(1.05); opacity: 1; }
    }

    #welcome-view h1 {
        font-size: 80px;
        letter-spacing: 4px;
        font-weight: bold;
        color: #333;
    }

    #main-view {
        display: none; 
        flex-direction: column;
        height: 100%;
    }

    /* Trak zgoraj za prodajalca in kupca */
    .header-bar {
        background-color: #222;
        color: #fff;
        padding: 15px 25px;
        display: flex;
        justify-content: space-between;
        font-size: 24px;
        border-radius: 8px;
        margin-bottom: 25px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        flex-shrink: 0;
    }

    .header-bar span {
        font-weight: bold;
        color: #ffd700; 
    }

    /* Ovojnik, ki drži artikle in plačilo skupaj (za lep prikaz takoj pod artikli) */
    .scrollable-content {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .cart-container {
        width: 100%;
        margin-bottom: 20px;
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
    }

    td { 
        padding: 12px 0; 
        font-size: 20px;
        font-weight: normal;
        border-bottom: 1px solid #eee;
        vertical-align: top;
    }

    tr.last-scanned-item td {
        font-size: 30px;
        font-weight: bold;
        border-bottom: 2px solid #000;
        padding: 20px 0;
    }

    /* Izpis popusta pod artiklom */
    .item-discount {
        font-size: 16px;
        color: #e53935;
        font-style: italic;
        margin-top: 6px;
        font-weight: normal;
    }
    
    tr.last-scanned-item .item-discount {
        font-size: 20px; 
    }

    /* Plačilni del, ki se izpiše pod artikli */
    #payment-section {
        display: none;
        border-top: 3px dashed #000000;
        padding-top: 20px;
        margin-bottom: 40px; 
    }

    .info-row {
        display: flex;
        justify-content: space-between;
        font-size: 22px;
        margin-bottom: 5px;
    }

    .total-row {
        display: flex;
        justify-content: space-between;
        font-size: 45px;
        font-weight: bold;
        margin-top: 15px;
    }

    /* ZAHVALA (Sedaj je nežno prosojna, da se vse pod njo lepo vidi) */
    #overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.75); 
        backdrop-filter: blur(2px); 
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        text-align: center;
    }

    #overlay-content {
        background: #fff;
        padding: 40px 60px;
        border: 4px solid #000;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popIn {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    #overlay h1 { font-size: 60px; font-weight: bold; margin-bottom: 10px; color: #000; }
    #overlay p { font-size: 28px; color: #333; }

    /* =========================================
       DESNA STRAN (1/3) - Stranski panel z uro
       ========================================= */
    #side-panel {
        flex: 1; 
        background-color: #f7f7f7;
        border-left: 2px solid #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        text-align: center;
    }

    .side-brand {
        font-size: 40px;
        font-weight: bold;
        letter-spacing: 2px;
        margin-bottom: 40px;
        color: #222;
    }

    .side-clock {
        font-size: 70px;
        font-weight: bold;
        color: #000;
        line-height: 1;
    }

    .side-date {
        font-size: 24px;
        color: #666;
        margin-top: 10px;
        margin-bottom: 50px;
    }

    .side-message {
        font-size: 22px;
        color: #555;
        font-style: italic;
    }
</style>
</head>
<body>

    <div id="main-content">
        
        <div id="welcome-view">
            <h1>DOBRODOŠLI</h1>
        </div>

        <div id="main-view">
            <div class="header-bar">
                <div>Prodajalec: <span id="display-seller">-</span></div>
                <div>Stranka: <span id="display-customer">-</span></div>
            </div>

            <div class="scrollable-content">
                <div class="cart-container">
                    <table>
                        <tbody id="display-cart">
                        </tbody>
                    </table>
                </div>

                <div id="payment-section">
                    <div class="info-row">
                        <div>Popust (skupni):</div>
                        <div><span id="display-discount">0.00</span> WII</div>
                    </div>
                    <div class="info-row" id="status-row">
                        <div id="status-label">Stanje:</div>
                        <div id="display-remaining">0.00 WII</div>
                    </div>
                    <div class="total-row">
                        <div>SKUPAJ:</div>
                        <div><span id="display-total">0.00</span> WII</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="overlay">
            <div id="overlay-content">
                <h1>HVALA ZA NAROČILO!</h1>
                <p>Nasvidenje!</p>
            </div>
        </div>
    </div>

    <div id="side-panel">
        <div class="side-brand">WII SHOP</div>
        <div class="side-clock" id="live-clock">00:00</div>
        <div class="side-date" id="live-date">--.--.----</div>
        <div class="side-message">Hvala, ker nakupujete pri nas.</div>
    </div>

<script>
    // Posodabljanje ure na stranskem panelu
    function updateClock() {
        const zdaj = new Date();
        document.getElementById('live-clock').innerText = zdaj.toLocaleTimeString('sl-SI', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('live-date').innerText = zdaj.toLocaleDateString('sl-SI');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Poslušalec za podatke blagajne
    window.addEventListener('storage', (e) => {
        if (e.key === 'wii_projekcija_data') {
            const data = JSON.parse(e.newValue);
            posodobiPrikaz(data);
        }
    });

    function posodobiPrikaz(data) {
        const welcomeView = document.getElementById('welcome-view');
        const mainView = document.getElementById('main-view');
        const paymentSection = document.getElementById('payment-section');
        const overlay = document.getElementById('overlay');
        const tbody = document.getElementById('display-cart');

        const status = data.status || 'buying';
        const cart = data.cart || [];

        // KORAK 1: NAKUPOVANJE - Če je prazna košarica
        if (status === 'buying' && cart.length === 0) {
            welcomeView.style.display = "flex";
            mainView.style.display = "none";
            paymentSection.style.display = "none";
            overlay.style.display = "none";
            return;
        }

        // PRIKAZ GLAVNEGA POGLEDA
        welcomeView.style.display = "none";
        mainView.style.display = "flex";

        // Upravljanje prosojnega overlay-a ob zaključku naročila
        if (status === 'finished') {
            overlay.style.display = "flex";
            // Osveži stran po 5 sekundah za naslednjega kupca
            if (!window.finishedTimeout) {
                window.finishedTimeout = setTimeout(() => {
                    window.finishedTimeout = null;
                    location.reload(); 
                }, 5000);
            }
        } else {
            overlay.style.display = "none";
            if (window.finishedTimeout) {
                clearTimeout(window.finishedTimeout);
                window.finishedTimeout = null;
            }
        }

        // Posodobitev zgornjega traku
        document.getElementById('display-seller').innerText = data.seller || "Blagajna 1";
        document.getElementById('display-customer').innerText = data.customer || "Gost";

        // Tabelaričen izpis artiklov
        tbody.innerHTML = '';
        cart.forEach((item, index) => {
            const tr = document.createElement('tr');
            
            // Povečano izpišemo samo zadnji artikel in SAMO takrat, ko še dodajamo (buying)
            if (index === cart.length - 1 && status === 'buying') {
                tr.className = 'last-scanned-item';
            }

            // Priprava izpisa za popust pri posameznem artiklu
            let popustHtml = '';
            const itemPopust = item.popust || item.discount || 0;
            if (parseFloat(itemPopust) > 0) {
                popustHtml = `<div class="item-discount">Popust: -${parseFloat(itemPopust).toFixed(2)} WII</div>`;
            }

            tr.innerHTML = `
                <td>
                    <div>${item.naziv}</div>
                    ${popustHtml}
                </td>
                <td style="text-align: center; width: 15%;">x${item.kol}</td>
                <td style="text-align: right; width: 25%;">${parseFloat(item.total).toFixed(2)} WII</td>
            `;
            tbody.appendChild(tr);
        });

        // UPRAVLJANJE PLAČILNEGA DELA (Prikaže se pri 'payment' in tudi pri 'finished')
        if (status === 'payment' || status === 'finished') {
            paymentSection.style.display = "block";
            
            document.getElementById('display-total').innerText = parseFloat(data.total || 0).toFixed(2);
            
            const popustVrednost = data.popust !== undefined ? data.popust : (data.discount || "0.00");
            document.getElementById('display-discount').innerText = parseFloat(popustVrednost).toFixed(2); 

            const statusLabel = document.getElementById('status-label');
            const remainingDiv = document.getElementById('display-remaining');

            if (parseFloat(data.change) > 0) {
                statusLabel.innerText = "VRAČILO:";
                remainingDiv.innerHTML = `<span style="color: green; font-weight: bold;">${parseFloat(data.change).toFixed(2)} WII</span>`;
            } else {
                statusLabel.innerText = "ŠE ZA PLAČILO:";
                remainingDiv.innerHTML = `<span style="color: red; font-weight: bold;">${parseFloat(data.remaining || 0).toFixed(2)} WII</span>`;
            }
        } else {
            paymentSection.style.display = "none";
        }

        // Avtomatski pomik na dno seznama
        const scrollContainer = document.querySelector('.scrollable-content');
        if (scrollContainer) scrollContainer.scrollTop = scrollContainer.scrollHeight;
    }

    // Inicializacija ob osvežitvi
    window.onload = () => {
        const initialData = localStorage.getItem('wii_projekcija_data');
        if (initialData) {
            posodobiPrikaz(JSON.parse(initialData));
        } else {
            document.getElementById('welcome-view').style.display = "flex";
            document.getElementById('main-view').style.display = "none";
        }
    };
</script>
</body>
</html>
