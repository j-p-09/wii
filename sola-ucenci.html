<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WII Sola - E-Redovalnica za učence</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        /* --- OSNOVNI STILI --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .hidden { display: none !important; }
        .bold { font-weight: bold; }

        /* --- PRIJAVNI ZASLON --- */
        #login-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .login-btn-large {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #e0e0e0;
            border: 2px solid #808080;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .login-btn-large:hover { background-color: #d0d0d0; }
        .login-btn-large:active { transform: translateY(2px); box-shadow: none; }

        /* --- GLAVNI ZASLON --- */
        #main-page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .top-bar {
            background-color: #e0e0e0;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #999;
            font-size: 18px;
        }

        .logout-btn {
            padding: 5px 15px;
            background: #ffcccc;
            border: 1px solid #999;
            cursor: pointer;
            font-weight: bold;
        }

        .content-container {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 15px;
            overflow: hidden;
        }

        /* LEVA STRAN: Tabela ocen */
        .left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .gradebook-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border: 1px solid #999;
        }

        .gradebook-table th, .gradebook-table td {
            border: 1px solid #999;
            text-align: center;
            vertical-align: middle;
            height: 35px;
        }

        .gradebook-table th {
            background-color: #ffffcc; /* Rumena podlaga kot na sliki */
            font-weight: normal;
        }
        
        .gradebook-table .subj-cell {
            text-align: left;
            padding-left: 10px;
            background-color: #ffffff;
            width: 25%;
        }

        .grade-cell {
            min-width: 40px;
            background-color: #ffffff;
        }

        .disabled-sector {
            background-color: #e0e0e0 !important;
        }

        /* DESNA STRAN: Zgodovina ocen */
        .right-panel {
            flex: 1;
            border: 1px solid #999;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            min-width: 250px;
        }

        .history-table-container {
            overflow-y: auto;
            flex: 1;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .history-table th {
            background-color: #ffffcc;
            border: 1px solid #999;
            position: sticky;
            top: 0;
            padding: 4px;
            z-index: 10;
        }

        .history-table td {
            border: 1px solid #999;
            padding: 4px;
            text-align: center;
        }

        /* OBLIKOVANJE OCEN */
        .grade-span { margin: 0 3px; position: relative; display: inline-block; font-size: 15px;}
        .grade-pisno { color: red; font-weight: bold; }
        .grade-ustno { color: black; font-weight: bold; }
        .grade-izdelek { color: blue; font-weight: bold; }
        .grade-correction { font-size: 0.7em; vertical-align: sub; margin-right: 2px; }

        .warn-x { color: red; font-weight: bold; }
        .warn-check { color: green; font-weight: bold; }

        /* LEGENDA */
        .legend-container {
            margin-top: 20px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .legend-row {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f5f5f5;
            padding: 5px;
            border: 1px solid #ddd;
        }
        .legend-box {
            display: flex;
            gap: 20px;
            justify-content: space-around;
            width: 100%;
        }
        .legend-item {
            border: 1px solid black;
            padding: 2px 20px;
            flex: 1;
            text-align: center;
            font-weight: bold;
        }

        /* --- MODAL (POGOVORNO OKNO) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-window {
            background: #fff;
            border: 2px solid #808080;
            padding: 20px;
            width: 350px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
        }
        .modal-header {
            font-size: 18px; font-weight: bold; margin-bottom: 15px;
        }
        .modal-select {
            width: 100%; padding: 8px; margin-bottom: 15px; font-size: 16px;
        }
        .modal-btn {
            width: 100%; padding: 10px; background: #e0e0e0; border: 1px solid #808080;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="login-page">
        <h1 style="margin-bottom: 40px; font-size: 36px;">E-Dnevnik Učenec</h1>
        <button class="login-btn-large" onclick="openLoginModal()">PRIJAVA</button>
    </div>

    <div id="main-page" class="hidden">
        <div class="top-bar">
            <div>
                Prijavljen: <span id="display-student-name" class="bold" style="text-transform: uppercase;"></span>
                <span id="display-class-name" style="margin-left: 10px; color: #555;"></span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Odjava</button>
        </div>

        <div class="content-container">
            <div class="left-panel">
                <div id="table-container"></div>
                
                <div class="legend-container">
                    <div class="legend-row">
                        <span><img src="nok.png" alt="✘" style="width:16px; height:16px; vertical-align:middle; margin-right:5px;"> ni opravil vseh obveznosti sklopa pozitivno</span>
                        <span><img src="ok.png" alt="✔" style="width:16px; height:16px; vertical-align:middle; margin-right:5px;"> naknadno opravil vse obveznosti sklopa pozitivno</span>
                    </div>
                    <div class="legend-box">
                        <div class="legend-item" style="color: black;">ustno</div>
                        <div class="legend-item" style="color: red;">pisno</div>
                        <div class="legend-item" style="color: blue;">izdelek</div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="history-table-container">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th width="40%">Datum</th>
                                <th width="30%">Predmet</th>
                                <th width="30%">Ocena</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-container"></div>

<script>
// --- FIREBASE SETUP ---
const firebaseConfig = { databaseURL: "https://wii-sola-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let db = { classes: [], subjects: [], grades: [], warnings: [], sectorSettings: {} };

let currentSession = {
    classId: null,
    studentId: null,
    studentName: null,
    className: null
};

// Nastavitev "poslušalca" - ob vsaki spremembi baze se podatki in UI osvežijo
database.ref('wii_sola_db').on('value', snapshot => {
    if(snapshot.exists()) {
        const data = snapshot.val();
        db = { ...db, ...data };
        if(!db.classes) db.classes = [];
        if(!db.subjects) db.subjects = [];
        if(!db.grades) db.grades = [];
        if(!db.warnings) db.warnings = [];
        if(!db.sectorSettings) db.sectorSettings = {};
        
        // Če je učenec prijavljen, osveži njegov pogled takoj
        if(currentSession.studentId) {
            renderStudentView();
        }
    }
});

// --- LOGIKA PRIJAVE (MODAL) ---
function openLoginModal() {
    if(db.classes.length === 0) {
        alert("Baza šole še ni vzpostavljena (ni razredov).");
        return;
    }

    let classOpts = '<option value="">-- Izberi razred --</option>';
    db.classes.forEach(c => {
        classOpts += `<option value="${c.id}">${c.name}</option>`;
    });

    const html = `
        <div class="modal-overlay" id="login-modal-bg">
            <div class="modal-window">
                <div class="modal-header">Prijava učenca</div>
                
                <select id="login-class-sel" class="modal-select" onchange="updateStudentList()">
                    ${classOpts}
                </select>
                
                <select id="login-student-sel" class="modal-select" disabled>
                    <option value="">-- Najprej izberi razred --</option>
                </select>

                <button class="modal-btn" onclick="confirmLogin()">NADALJUJ</button>
                <button class="modal-btn" onclick="closeModal()" style="margin-top:10px; background:#f99;">PREKLIČI</button>
            </div>
        </div>
    `;
    document.getElementById('modal-container').innerHTML = html;
}

function updateStudentList() {
    const classId = parseInt(document.getElementById('login-class-sel').value);
    const studentSel = document.getElementById('login-student-sel');
    
    if(!classId) {
        studentSel.innerHTML = '<option value="">-- Najprej izberi razred --</option>';
        studentSel.disabled = true;
        return;
    }

    const cls = db.classes.find(c => c.id === classId);
    if(cls && cls.students && cls.students.length > 0) {
        let stuOpts = '<option value="">-- Izberi svoje ime --</option>';
        cls.students.forEach(s => {
            stuOpts += `<option value="${s.id}">${s.name}</option>`;
        });
        studentSel.innerHTML = stuOpts;
        studentSel.disabled = false;
    } else {
        studentSel.innerHTML = '<option value="">-- V tem razredu ni učencev --</option>';
        studentSel.disabled = true;
    }
}

function confirmLogin() {
    const classId = parseInt(document.getElementById('login-class-sel').value);
    const studentId = parseInt(document.getElementById('login-student-sel').value);

    if(!classId || !studentId) {
        alert("Prosimo, izberite razred in ime.");
        return;
    }

    const cls = db.classes.find(c => c.id === classId);
    const student = cls.students.find(s => s.id === studentId);

    currentSession.classId = classId;
    currentSession.studentId = studentId;
    currentSession.studentName = student.name;
    currentSession.className = cls.name;

    document.getElementById('display-student-name').innerText = student.name;
    document.getElementById('display-class-name').innerText = `(${cls.name})`;

    closeModal();
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main-page').classList.remove('hidden');

    renderStudentView();
}

function handleLogout() {
    currentSession = { classId: null, studentId: null, studentName: null, className: null };
    document.getElementById('main-page').classList.add('hidden');
    document.getElementById('login-page').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('modal-container').innerHTML = '';
}

// --- IZRIS ZASLONA ---
function renderStudentView() {
    renderGradeTable();
    renderHistoryTable();
}

// 1. Tabela Ocen (Leva stran)
function renderGradeTable() {
    const sId = currentSession.studentId;
    const cId = currentSession.classId;

    let thead = `
        <tr>
            <th rowspan="2" class="subj-cell" style="width: 25%;">Predmet</th>
            <th colspan="8">Ocene po sklopih</th>
            <th rowspan="2" style="width: 10%;">Zaključena<br>ocena</th>
        </tr>
        <tr>
            <th style="width: 12%;">A</th><th style="width: 4%;">✘/✔</th>
            <th style="width: 12%;">B</th><th style="width: 4%;">✘/✔</th>
            <th style="width: 12%;">C</th><th style="width: 4%;">✘/✔</th>
            <th style="width: 12%;">D</th><th style="width: 4%;">✘/✔</th>
        </tr>
    `;

    let tbody = '';
    const sectors = ['A', 'B', 'C', 'D'];

    db.subjects.forEach(sub => {
        let row = `<tr><td class="subj-cell">${sub.name}</td>`;
        
        sectors.forEach(sec => {
            const key = `${cId}_${sub.id}`;
            let disabled = false;
            // Preveri ali je sektor sivo obarvan v nastavitvah razreda
            if (db.sectorSettings[key] && db.sectorSettings[key][sec] === false) {
                disabled = true;
            }

            const classStr = disabled ? 'grade-cell disabled-sector' : 'grade-cell';
            
            // Pridobi ocene za ta sklop
            const gradesHtml = renderCellContent(sId, sub.id, sec);
            // Pridobi grajo/opravljeno ikono
            const warnHtml = getWarnHtml(sId, sub.id, sec);

            row += `<td class="${classStr}">${gradesHtml}</td>`;
            row += `<td class="${classStr}">${warnHtml}</td>`;
        });

        // Zaključna ocena
        const finalHtml = getFinalHtml(sId, sub.id);
        row += `<td class="grade-cell">${finalHtml}</td></tr>`;
        
        tbody += row;
    });

    document.getElementById('table-container').innerHTML = `
        <table class="gradebook-table">
            <thead>${thead}</thead>
            <tbody>${tbody}</tbody>
        </table>
    `;
}

// 2. Zgodovina Datumska (Desna stran)
function renderHistoryTable() {
    const sId = currentSession.studentId;
    
    // Filtriraj redne ocene (brez zaključnih)
    let myGrades = db.grades.filter(g => g.studentId === sId && !g.isFinal).map(g => ({ ...g, isWarning: false }));
    
    // Filtriraj graje (tip 'x'), ki se štejejo kot ocena za stransko tabelo
    let myWarnings = db.warnings.filter(w => w.studentId === sId && w.type === 'x').map(w => ({ ...w, isWarning: true }));
    
    // Združi oboje skupaj
    let combinedHistory = [...myGrades, ...myWarnings];
    
    // Razvrsti padajoče glede na id (timestamp vnosa)
    combinedHistory.sort((a, b) => b.id - a.id);

    let rows = combinedHistory.map(item => {
        let sub = db.subjects.find(s => s.id === item.subjectId);
        let subName = sub ? sub.name.substring(0,3).toUpperCase() : '???';
        
        let valHtml = '';
        if (item.isWarning) {
            // Če je graja (x), prikaži sliko nok.png
            valHtml = `<img src="nok.png" alt="✘" style="width:16px; height:16px; vertical-align:middle;">`;
        } else {
            // Izbira barve glede na tip ocene
            let cls = item.type === 'PISNO' ? 'grade-pisno' : (item.type === 'IZDELEK' ? 'grade-izdelek' : 'grade-ustno');
            
            // Izpis ocene s popravkom, če obstaja
            valHtml = item.correction 
                ? `<span class="${cls}"><span class="grade-correction">${item.value}</span>${item.correction}</span>` 
                : `<span class="${cls}">${item.value}</span>`;
        }

        return `
            <tr>
                <td>${item.date || ''}</td>
                <td>${subName}</td>
                <td>${valHtml}</td>
            </tr>
        `;
    }).join('');

    if (rows === '') {
        rows = `<tr><td colspan="3" style="color:#777;">Ni vpisanih ocen ali graj.</td></tr>`;
    }

    document.getElementById('history-tbody').innerHTML = rows;
}

// --- POMOŽNE FUNKCIJE ZA RENDER ---
function renderCellContent(studentId, subjectId, period) {
    const allGrades = db.grades.filter(g => g.studentId === studentId && g.subjectId === subjectId && g.period === period && !g.isFinal);
    let h = '';
    allGrades.forEach(g => {
        let cls = g.type === 'PISNO' ? 'grade-pisno' : (g.type === 'IZDELEK' ? 'grade-izdelek' : 'grade-ustno');
        let val = g.correction ? `<span class="${cls}"><span class="grade-correction">${g.value}</span>${g.correction}</span>` : `<span class="${cls}">${g.value}</span>`;
        h += `<span class="grade-span">${val}</span>`;
    });
    return h;
}

function getWarnHtml(studentId, subjectId, period) {
    const w = db.warnings.find(x => x.studentId === studentId && x.subjectId === subjectId && x.period === period);
    if(!w) return '';
    return w.type === 'x' 
        ? '<img src="nok.png" alt="✘" style="width:16px; height:16px; vertical-align:middle;">' 
        : '<img src="ok.png" alt="✔" style="width:16px; height:16px; vertical-align:middle;">';
}

function getFinalHtml(studentId, subjectId) {
    const g = db.grades.find(x => x.studentId === studentId && x.subjectId === subjectId && x.isFinal);
    if(!g) return '';
    return `<span style="font-weight:bold;">${g.value}</span>`;
}

</script>
</body>
</html>
